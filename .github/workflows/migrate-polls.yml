name: Migrate Public Polls Tables

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to run migration on production DB'
        required: true
        default: 'NO'

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        if: github.event.inputs.confirm != 'YES'
        run: |
          echo "❌ Confirmation required. Set input 'confirm' to 'YES' to proceed."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migration
        run: node scripts/migrate-polls.js
        env:
          DB_HOST:     ${{ secrets.DB_HOST }}
          DB_PORT:     ${{ secrets.DB_PORT }}
          DB_NAME:     ${{ secrets.DB_NAME }}
          DB_USER:     ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          NODE_ENV:    production
          JWT_SECRET:  ${{ secrets.JWT_SECRET }}

      - name: Done
        if: success()
        run: echo "✅ public_polls, poll_options y poll_votes creadas y seeded correctamente"
