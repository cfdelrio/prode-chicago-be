name: Deploy to AWS Lambda

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install all dependencies (including dev)
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    # Solo deployar en push a main (no en PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install production dependencies
        run: |
          # Borrar node_modules para garantizar instalación limpia (sin caché de runs anteriores)
          rm -rf node_modules
          npm ci --omit=dev

      - name: Create deployment package
        run: |
          # El checkout ahora tiene node_modules de producción limpios
          mkdir -p /tmp/lambda_deploy
          cp -r . /tmp/lambda_deploy/
          # Crear zip desde /tmp para que la estructura interna sea lambda_deploy/...
          cd /tmp
          zip -r deploy.zip lambda_deploy/ \
            --exclude "lambda_deploy/.git/*" \
            --exclude "lambda_deploy/.github/*" \
            --exclude "lambda_deploy/__tests__/*"

      - name: Upload package to S3 and deploy Lambda
        run: |
          # Subir a S3 para evitar el límite de 50MB en uploads directos
          aws s3 cp /tmp/deploy.zip s3://prode-chicago-uploads/lambda/prode-chicago-api.zip \
            --region us-east-1

          aws lambda update-function-code \
            --function-name prode-chicago-api \
            --s3-bucket prode-chicago-uploads \
            --s3-key lambda/prode-chicago-api.zip \
            --region us-east-1

          # Esperar a que termine de actualizar
          aws lambda wait function-updated \
            --function-name prode-chicago-api \
            --region us-east-1

          echo "✅ Deploy completado"
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1

      - name: Reapuntar API Gateway a prode-chicago-api
        run: |
          set -e
          API_ID="t49euho172"
          REGION="us-east-1"
          STAGE="prod"
          FUNCTION="prode-chicago-api"

          # Obtener el account ID desde el ARN del Lambda
          ACCOUNT_ID=$(aws lambda get-function-configuration \
            --function-name $FUNCTION --region $REGION \
            --query 'FunctionArn' --output text | cut -d: -f5)

          NEW_URI="arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT_ID}:function:${FUNCTION}/invocations"
          echo "Target URI: $NEW_URI"

          # Dar permiso al API Gateway para invocar prode-chicago-api (idempotente)
          aws lambda add-permission \
            --function-name $FUNCTION \
            --statement-id "agw-invoke-${API_ID}" \
            --action lambda:InvokeFunction \
            --principal apigateway.amazonaws.com \
            --source-arn "arn:aws:execute-api:${REGION}:${ACCOUNT_ID}:${API_ID}/*/*" \
            --region $REGION 2>/dev/null && echo "Permiso añadido" || echo "Permiso ya existía (ok)"

          # Recorrer todos los recursos y actualizar integraciones que apunten al lambda viejo
          RESOURCE_IDS=$(aws apigateway get-resources \
            --rest-api-id $API_ID --region $REGION \
            --query 'items[*].id' --output text)

          UPDATED=0
          for RESOURCE_ID in $RESOURCE_IDS; do
            METHODS=$(aws apigateway get-resource \
              --rest-api-id $API_ID --resource-id "$RESOURCE_ID" --region $REGION \
              --query 'keys(resourceMethods)' --output text 2>/dev/null || echo "")

            for METHOD in $METHODS; do
              CURRENT_URI=$(aws apigateway get-integration \
                --rest-api-id $API_ID --resource-id "$RESOURCE_ID" \
                --http-method "$METHOD" --region $REGION \
                --query 'uri' --output text 2>/dev/null || echo "")

              if echo "$CURRENT_URI" | grep -q ":function:prode-api/"; then
                aws apigateway update-integration \
                  --rest-api-id $API_ID --resource-id "$RESOURCE_ID" \
                  --http-method "$METHOD" --region $REGION \
                  --patch-operations "[{\"op\":\"replace\",\"path\":\"/uri\",\"value\":\"${NEW_URI}\"}]"
                echo "  ✓ Actualizado $RESOURCE_ID $METHOD"
                UPDATED=$((UPDATED + 1))
              fi
            done
          done

          if [ $UPDATED -gt 0 ]; then
            aws apigateway create-deployment \
              --rest-api-id $API_ID --stage-name $STAGE --region $REGION
            echo "✅ API Gateway reapuntado a $FUNCTION ($UPDATED integraciones)"
          else
            echo "ℹ️  API Gateway ya apunta a $FUNCTION, nada que cambiar"
          fi
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1
