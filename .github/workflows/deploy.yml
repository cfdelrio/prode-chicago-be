name: Deploy to AWS Lambda

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      restore_caballito_integration:
        description: 'Restaurar integración qc0bh1 → prode-api (prodecaballito.com)'
        required: false
        default: 'false'
        type: string
      create_chicago_apigw:
        description: 'Crear/verificar API Gateway prode-hr-api-gw para Chicago/HR'
        required: false
        default: 'false'
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install all dependencies (including dev)
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    # Deployar en push a main o workflow_dispatch manual (no en PRs)
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install production dependencies
        run: |
          # Borrar node_modules para garantizar instalación limpia (sin caché de runs anteriores)
          rm -rf node_modules
          npm ci --omit=dev

      - name: Create deployment package
        run: |
          # Zip desde el directorio del repo para que handler lambda.handler
          # encuentre los archivos en la raíz (lambda.js, middleware/, etc.)
          zip -r /tmp/deploy.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "__tests__/*"

      - name: Upload package to S3 and deploy Lambda
        run: |
          # Subir a S3 para evitar el límite de 50MB en uploads directos
          aws s3 cp /tmp/deploy.zip s3://prode-chicago-uploads/lambda/prode-chicago-api.zip \
            --region us-east-1

          aws lambda update-function-code \
            --function-name prode-chicago-api \
            --s3-bucket prode-chicago-uploads \
            --s3-key lambda/prode-chicago-api.zip \
            --region us-east-1

          # Esperar a que termine de actualizar
          aws lambda wait function-updated \
            --function-name prode-chicago-api \
            --region us-east-1

          echo "✅ Deploy completado"
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1

      - name: Crear API Gateway para Chicago/HR (solo si se pide explícitamente)
        if: github.event.inputs.create_chicago_apigw == 'true'
        run: |
          set -e
          REGION="us-east-1"
          FUNCTION="prode-chicago-api"
          API_NAME="prode-hr-api-gw"
          STAGE="prod"

          ACCOUNT_ID=$(aws lambda get-function-configuration \
            --function-name $FUNCTION --region $REGION \
            --query 'FunctionArn' --output text | cut -d: -f5)

          LAMBDA_URI="arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT_ID}:function:${FUNCTION}/invocations"

          # Crear si no existe; reutilizar si ya existe
          EXISTING=$(aws apigateway get-rest-apis --region $REGION \
            --query "items[?name=='${API_NAME}'].id | [0]" --output text)

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "None" ]; then
            echo "API Gateway '${API_NAME}' ya existe: $EXISTING"
            API_ID="$EXISTING"
          else
            API_ID=$(aws apigateway create-rest-api \
              --name "$API_NAME" --region $REGION \
              --endpoint-configuration "types=REGIONAL" \
              --query 'id' --output text)
            echo "Creado: $API_ID"
          fi

          ROOT_ID=$(aws apigateway get-resources --rest-api-id $API_ID --region $REGION \
            --query 'items[?path==`/`].id | [0]' --output text)

          # Recurso {proxy+} — captura todas las rutas /api/...
          PROXY_ID=$(aws apigateway get-resources --rest-api-id $API_ID --region $REGION \
            --query 'items[?pathPart==`{proxy+}`].id | [0]' --output text)
          if [ -z "$PROXY_ID" ] || [ "$PROXY_ID" = "None" ]; then
            PROXY_ID=$(aws apigateway create-resource \
              --rest-api-id $API_ID --parent-id $ROOT_ID \
              --path-part "{proxy+}" --region $REGION \
              --query 'id' --output text)
            echo "Recurso {proxy+} creado: $PROXY_ID"
          fi

          # ANY en {proxy+} → Lambda proxy
          aws apigateway put-method \
            --rest-api-id $API_ID --resource-id $PROXY_ID \
            --http-method ANY --authorization-type NONE \
            --region $REGION 2>/dev/null || true
          aws apigateway put-integration \
            --rest-api-id $API_ID --resource-id $PROXY_ID \
            --http-method ANY --type AWS_PROXY --integration-http-method POST \
            --uri $LAMBDA_URI --region $REGION

          # ANY en root / → Lambda proxy (necesario para rutas sin path)
          aws apigateway put-method \
            --rest-api-id $API_ID --resource-id $ROOT_ID \
            --http-method ANY --authorization-type NONE \
            --region $REGION 2>/dev/null || true
          aws apigateway put-integration \
            --rest-api-id $API_ID --resource-id $ROOT_ID \
            --http-method ANY --type AWS_PROXY --integration-http-method POST \
            --uri $LAMBDA_URI --region $REGION

          # Deploy al stage
          aws apigateway create-deployment \
            --rest-api-id $API_ID --stage-name $STAGE --region $REGION

          # Permiso Lambda (idempotente)
          aws lambda add-permission \
            --function-name $FUNCTION \
            --statement-id "agw-invoke-${API_ID}" \
            --action lambda:InvokeFunction \
            --principal apigateway.amazonaws.com \
            --source-arn "arn:aws:execute-api:${REGION}:${ACCOUNT_ID}:${API_ID}/*/*" \
            --region $REGION 2>/dev/null && echo "Permiso Lambda añadido" || echo "Permiso Lambda ya existía (ok)"

          API_URL="https://${API_ID}.execute-api.${REGION}.amazonaws.com/${STAGE}"
          echo ""
          echo "✅ API Gateway lista: $API_URL"
          echo "📋 Actualizar VITE_API_URL en Chicago FE a: ${API_URL}/api"
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1

      - name: Reapuntar API Gateway prode-hr-api-gw a prode-chicago-api
        run: |
          set -e
          REGION="us-east-1"
          STAGE="prod"
          FUNCTION="prode-chicago-api"
          API_NAME="prode-hr-api-gw"

          # Buscar API Gateway de Chicago/HR por nombre
          API_ID=$(aws apigateway get-rest-apis --region $REGION \
            --query "items[?name=='${API_NAME}'].id | [0]" --output text)

          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            echo "⚠️  API Gateway '${API_NAME}' no existe aún. Ejecutar con create_chicago_apigw=true primero."
            exit 0
          fi

          ACCOUNT_ID=$(aws lambda get-function-configuration \
            --function-name $FUNCTION --region $REGION \
            --query 'FunctionArn' --output text | cut -d: -f5)

          NEW_URI="arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT_ID}:function:${FUNCTION}/invocations"
          echo "API Gateway: $API_ID  →  $FUNCTION"

          # Permiso Lambda (idempotente)
          aws lambda add-permission \
            --function-name $FUNCTION \
            --statement-id "agw-invoke-${API_ID}" \
            --action lambda:InvokeFunction \
            --principal apigateway.amazonaws.com \
            --source-arn "arn:aws:execute-api:${REGION}:${ACCOUNT_ID}:${API_ID}/*/*" \
            --region $REGION 2>/dev/null && echo "Permiso añadido" || echo "Permiso ya existía (ok)"

          # Recorrer recursos y asegurarse de que apunten a prode-chicago-api
          RESOURCE_IDS=$(aws apigateway get-resources \
            --rest-api-id $API_ID --region $REGION \
            --query 'items[*].id' --output text)

          UPDATED=0
          for RESOURCE_ID in $RESOURCE_IDS; do
            METHODS=$(aws apigateway get-resource \
              --rest-api-id $API_ID --resource-id "$RESOURCE_ID" --region $REGION \
              --query 'keys(resourceMethods)' --output text 2>/dev/null || echo "")

            for METHOD in $METHODS; do
              CURRENT_URI=$(aws apigateway get-integration \
                --rest-api-id $API_ID --resource-id "$RESOURCE_ID" \
                --http-method "$METHOD" --region $REGION \
                --query 'uri' --output text 2>/dev/null || echo "")

              echo "  $RESOURCE_ID $METHOD → ${CURRENT_URI:-<sin integración Lambda>}"

              if echo "$CURRENT_URI" | grep -q ":function:" && \
                 ! echo "$CURRENT_URI" | grep -q ":function:prode-chicago-api"; then
                aws apigateway update-integration \
                  --rest-api-id $API_ID --resource-id "$RESOURCE_ID" \
                  --http-method "$METHOD" --region $REGION \
                  --patch-operations "[{\"op\":\"replace\",\"path\":\"/uri\",\"value\":\"${NEW_URI}\"}]"
                echo "  ✓ Actualizado → prode-chicago-api"
                UPDATED=$((UPDATED + 1))
              fi
            done
          done

          if [ $UPDATED -gt 0 ]; then
            aws apigateway create-deployment \
              --rest-api-id $API_ID --stage-name $STAGE --region $REGION
            echo "✅ API Gateway reapuntado a $FUNCTION ($UPDATED integraciones)"
          else
            echo "ℹ️  API Gateway ya apunta a $FUNCTION, nada que cambiar"
          fi
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1

      - name: Restaurar integración prode-api (solo si se pide explícitamente)
        if: github.event.inputs.restore_caballito_integration == 'true'
        run: |
          set -e
          REGION="us-east-1"
          CABALLITO_FUNCTION="prode-api"
          RESOURCE_ID="qc0bh1"
          API_ID="t49euho172"

          ACCOUNT_ID=$(aws lambda get-function-configuration \
            --function-name $CABALLITO_FUNCTION --region $REGION \
            --query 'FunctionArn' --output text | cut -d: -f5)

          CABALLITO_URI="arn:aws:apigateway:${REGION}:lambda:path/2015-03-31/functions/arn:aws:lambda:${REGION}:${ACCOUNT_ID}:function:${CABALLITO_FUNCTION}/invocations"

          aws apigateway update-integration \
            --rest-api-id $API_ID --resource-id "$RESOURCE_ID" \
            --http-method ANY --region $REGION \
            --patch-operations "[{\"op\":\"replace\",\"path\":\"/uri\",\"value\":\"${CABALLITO_URI}\"}]"

          aws apigateway create-deployment \
            --rest-api-id $API_ID --stage-name prod --region $REGION

          echo "✅ Restaurado $RESOURCE_ID ANY → prode-api (prodecaballito.com)"
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1
